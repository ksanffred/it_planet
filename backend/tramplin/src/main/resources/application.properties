spring.application.name=tramplin

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/tramplin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Run data.sql after Hibernate has created/updated the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.cache.opportunity-ttl-minutes=${CACHE_OPPORTUNITY_TTL_MINUTES:10}

# JWT
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seQ==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail
spring.mail.host=${MAIL_HOST:mail.hosting.reg.ru}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:noreply@tramplin-itplanet.ru}
spring.mail.password=${MAIL_PASSWORD:wN6kL2oT4jjF9fD4}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Verification
# app.base-url=${APP_BASE_URL:https://tramplin-itplanet.ru}
app.base-url=${APP_BASE_URL:http://localhost}
app.verification.token-ttl-hours=${VERIFICATION_TOKEN_TTL_HOURS:24}
